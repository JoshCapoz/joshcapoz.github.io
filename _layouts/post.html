---
layout: default
---
<a class="back-link" href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a>
<article>
  <h1>{{ page.title }}</h1>
  <p class="meta">
    {{ page.date | date: "%-d %B %Y" }}
    {% if page.tags %} &middot; {{ page.tags | join: " &middot; " }}{% endif %}
  </p>
  {{ content }}
</article>
